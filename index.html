<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Biology CBT Portal</title>
    <style>
        :root {
            --coffee: #4B3832;
            --brown: #854442;
            --milk: #FFF4E6;
            --cream: #F5E6D3;
            --text: #3c2f2f;
        }
        body { font-family: 'Segoe UI', serif; background-color: var(--milk); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(75,56,50,0.1); border-top: 8px solid var(--coffee); }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--cream); padding-bottom: 10px; }
        .nav-link { color: var(--brown); cursor: pointer; text-decoration: none; font-weight: bold; }
        .btn { background: var(--coffee); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 1rem; margin: 5px 0; }
        .btn:hover { background: var(--brown); }
        .timer-box { font-size: 1.5rem; font-weight: bold; color: var(--brown); background: var(--cream); padding: 10px 20px; border-radius: 8px; }
        .palette { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; }
        .p-num { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--coffee); border-radius: 4px; cursor: pointer; }
        .p-num.done { background: var(--brown); color: white; border: none; }
        .p-num.active { border: 3px solid var(--coffee); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: left; }
        th { background: var(--coffee); color: white; }
        .hidden { display: none; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dcd0c0; border-radius: 6px; box-sizing: border-box; background: var(--cream); }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <span id="nav-title" style="font-weight:bold; color:var(--coffee);">Biology Student Portal</span>
        <a class="nav-link" id="auth-toggle" onclick="toggleAdminView()">Admin Login</a>
    </div>

    <div id="view-student-login">
        <h1>Biology Examination</h1>
        <p>Pre-loaded Exam: <b>Circulatory & Respiratory Systems</b></p>
        <input type="text" id="stu-id" placeholder="Enter Your Student ID">
        <button class="btn" onclick="startExam()">Start Now</button>
    </div>

    <div id="view-exam" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 id="q-header">Question 1</h3>
            <div class="timer-box" id="time-display">00:00</div>
        </div>
        <hr>
        <p id="q-text" style="font-size: 1.25rem; min-height: 80px;"></p>
        <div id="options-container"></div>
        <div class="palette" id="q-palette"></div>
        <button class="btn" style="width:100%; background:var(--brown);" onclick="confirmSubmit()">Submit Final Paper</button>
    </div>

    <div id="view-admin-login" class="hidden">
        <h2>Admin Authentication</h2>
        <input type="text" id="admin-user" placeholder="Username">
        <input type="password" id="admin-pass" placeholder="Password">
        <button class="btn" onclick="doAdminLogin()">Login</button>
    </div>

    <div id="view-admin-dashboard" class="hidden">
        <h2>Admin Dashboard</h2>
        <div style="background: var(--cream); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <h3>Update Duration</h3>
            <input type="number" id="set-duration" value="10">
            <button class="btn" onclick="updateSettings()">Set Minutes</button>
        </div>
        <h3>Student Results</h3>
        <table id="log-table">
            <thead><tr><th>Student ID</th><th>Date/Time</th><th>Score</th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="btn" onclick="downloadCSV()" style="background:#27ae60;">Download Excel (.csv)</button>
    </div>
</div>

<script>
    // PRE-LOADED DATA
    const defaultQuestions = [
        { q: "The blood cells responsible for oxygen transportation are:", a: ["Erythrocytes", "Leucocytes", "Thrombocytes", "Plasma"], c: 0 },
        { q: "Which of the following cells is mainly involved in body defence?", a: ["Platelets", "Leucocytes", "Erythrocytes", "Hemoglobin"], c: 1 },
        { q: "Blood clotting primarily involves:", a: ["Leucocytes", "Plasma proteins only", "Thrombocytes", "Erythrocytes"], c: 2 },
        { q: "The largest artery in the body is the:", a: ["Pulmonary artery", "Carotid artery", "Coronary artery", "Aorta"], c: 3 },
        { q: "Veins differ from arteries because veins:", a: ["Carry blood away from the heart", "Have thicker walls", "Carry only oxygenated blood", "Contain valves"], c: 3 },
        { q: "Blood capillaries are characterized by:", a: ["Thick muscular walls", "Multiple layers of cells", "Single layer of endothelial cells", "Presence of valves"], c: 2 },
        { q: "Pulmonary circulation involves blood flow between the:", a: ["Heart and body tissues", "Heart and lungs", "Lungs and tissues", "Veins and arteries"], c: 1 },
        { q: "The right lung has how many lobes?", a: ["One", "Two", "Three", "Four"], c: 2 },
        { q: "Inspiration occurs when:", a: ["Thoracic volume increases", "Thoracic pressure increases", "Diaphragm relaxes", "Air moves out of the lungs"], c: 0 },
        { q: "Residual volume refers to the:", a: ["Air exchanged during normal breathing", "Extra air inhaled after normal inspiration", "Extra air exhaled after normal expiration", "Air remaining after maximum expiration"], c: 3 }
    ];

    let questions = JSON.parse(localStorage.getItem('cbt_questions')) || defaultQuestions;
    let logs = JSON.parse(localStorage.getItem('cbt_logs')) || [];
    let examDuration = localStorage.getItem('cbt_duration') || 10;
    let userAnswers = [];
    let currentIdx = 0;
    let timerInterval;

    function showView(viewId) {
        ['view-student-login', 'view-exam', 'view-admin-login', 'view-admin-dashboard'].forEach(v => {
            document.getElementById(v).classList.add('hidden');
        });
        document.getElementById(viewId).classList.remove('hidden');
    }

    function toggleAdminView() {
        const link = document.getElementById('auth-toggle');
        if(link.innerText === "Admin Login") {
            showView('view-admin-login');
            link.innerText = "Back";
        } else { location.reload(); }
    }

    function doAdminLogin() {
        if(document.getElementById('admin-user').value === "alfajr20" && 
           document.getElementById('admin-pass').value === "abba2332k") {
            showView('view-admin-dashboard');
            renderAdminData();
        } else { alert("Wrong Password"); }
    }

    function renderAdminData() {
        const tbody = document.querySelector('#log-table tbody');
        tbody.innerHTML = logs.map(l => `<tr><td>${l.id}</td><td>${l.date}</td><td>${l.score}/${l.total}</td></tr>`).join('');
    }

    function startExam() {
        const id = document.getElementById('stu-id').value;
        if(!id) return alert("Enter ID");
        userAnswers = new Array(questions.length).fill(null);
        showView('view-exam');
        renderQuestion(0);
        let time = examDuration * 60;
        timerInterval = setInterval(() => {
            let m = Math.floor(time/60), s = time%60;
            document.getElementById('time-display').innerText = `${m}:${s<10?'0':''}${s}`;
            if(time <= 0) submitExam();
            time--;
        }, 1000);
    }

    function renderQuestion(idx) {
        currentIdx = idx;
        const q = questions[idx];
        document.getElementById('q-header').innerText = `Question ${idx + 1}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('options-container').innerHTML = q.a.map((opt, i) => `
            <label style="display:block; padding:15px; background:var(--cream); margin-bottom:10px; border-radius:8px; cursor:pointer;">
                <input type="radio" name="ans" onclick="userAnswers[${idx}]=${i}; renderPalette();" ${userAnswers[idx] === i ? 'checked' : ''}> ${opt}
            </label>
        `).join('');
        renderPalette();
    }

    function renderPalette() {
        document.getElementById('q-palette').innerHTML = questions.map((_, i) => `
            <div class="p-num ${userAnswers[i]!==null?'done':''} ${currentIdx===i?'active':''}" onclick="renderQuestion(${i})">${i+1}</div>
        `).join('');
    }

    function confirmSubmit() { if(confirm("Submit your work?")) submitExam(); }

    function submitExam() {
        clearInterval(timerInterval);
        let score = 0;
        questions.forEach((q, i) => { if(userAnswers[i] === q.c) score++; });
        logs.push({ id: document.getElementById('stu-id').value, date: new Date().toLocaleString(), score: score, total: questions.length });
        localStorage.setItem('cbt_logs', JSON.stringify(logs));
        alert("Done! Your score: " + score + "/" + questions.length);
        location.reload();
    }

    function downloadCSV() {
        let csv = "ID,Date,Score\n" + logs.map(l => `${l.id},${l.date},${l.score}`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'results.csv';
        a.click();
    }
</script>
</body>
              </html>
